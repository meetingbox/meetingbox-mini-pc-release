# MeetingBox appliance — device-ui + audio (+ Redis for Docker audio only).
# Use this folder as its own git repo on the mini PC, or as part of the monorepo.
#
# Copy .env.example → .env and set BACKEND_URL / UPLOAD_AUDIO_API_URL for your cloud API.
#
#   docker compose up -d --build
#
# Profiles (set COMPOSE_PROFILES in .env — see .env.example):
#   mini-pc, screen  — Kivy container (needs X11)
#   docker-audio      — Redis + audio container (omitted unless profile is active!)
#
# One-shot without editing .env:
#   docker compose --profile mini-pc --profile docker-audio up -d --build

name: meetingbox-appliance

services:
  redis:
    image: redis:7-alpine
    container_name: meetingbox-appliance-redis
    restart: unless-stopped
    profiles: ["docker-audio"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - appliance-redis-data:/data
    networks:
      - appliance-net

  audio:
    build:
      context: ./audio
    container_name: meetingbox-appliance-audio
    restart: unless-stopped
    profiles: ["docker-audio"]
    depends_on:
      redis:
        condition: service_started
    user: "1000:1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      # Empty / unset → audio_capture uses HTTP long-poll if DEVICE_AUTH_TOKEN is set, else Redis.
      - AUDIO_COMMAND_SOURCE=${AUDIO_COMMAND_SOURCE:-}
      - AUDIO_POLL_BASE_URL=${AUDIO_POLL_BASE_URL:-}
      - RECORDINGS_DIR=/data/audio/recordings
      - TEMP_SEGMENTS_DIR=/data/audio/temp
      - AUDIO_INPUT_DEVICE_INDEX=${AUDIO_INPUT_DEVICE_INDEX:-}
      - AUDIO_INPUT_DEVICE_NAME=${AUDIO_INPUT_DEVICE_NAME:-}
      - UPLOAD_AUDIO_ON_STOP=${UPLOAD_AUDIO_ON_STOP:-1}
      - UPLOAD_AUDIO_API_URL=${UPLOAD_AUDIO_API_URL:-http://host.docker.internal:8000/api/meetings/upload-audio}
      - UPLOAD_AUDIO_TIMEOUT_SECONDS=${UPLOAD_AUDIO_TIMEOUT_SECONDS:-1200}
      - DEVICE_AUTH_TOKEN=${DEVICE_AUTH_TOKEN:-}
    volumes:
      - ./data/audio:/data/audio
      - ./data/config:/data/config:ro
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    networks:
      - appliance-net

  device-ui:
    build:
      context: ./device-ui
    container_name: meetingbox-appliance-ui
    user: "1000:1000"
    restart: unless-stopped
    profiles: ["mini-pc", "screen"]
    # Share host PID namespace so ``nsenter -t 1`` in meetingbox-host-reboot targets
    # the real systemd (PID 1 on the mini-PC). Without this, -t 1 is the container's
    # init and setns often fails with "reassociate to namespaces failed: Operation not permitted".
    pid: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8000}
      - BACKEND_WS_URL=${BACKEND_WS_URL:-}
      - DASHBOARD_URL=${DASHBOARD_URL:-}
      # Use DEVICE_UI_DISPLAY — not shell DISPLAY. SSH sets DISPLAY=localhost:10.0 which
      # breaks the kiosk X socket; local panel is almost always :0 or :1.
      - DISPLAY=${DEVICE_UI_DISPLAY:-:0}
      # Match cookie mount below — fixes "Authorization required, but no authorization protocol specified"
      - XAUTHORITY=/home/uiuser/.Xauthority
      # Prefer X11 via host socket (avoids SDL trying Wayland inside the container)
      - SDL_VIDEODRIVER=x11
      - KIVY_WINDOW=sdl2
      - KIVY_NO_CONSOLELOG=1
      # Default 1 = kiosk / single-app panel (borderless fullscreen). Set FULLSCREEN=0 in .env for windowed dev.
      - FULLSCREEN=${FULLSCREEN:-1}
      # 1 = show mouse pointer in fullscreen (USB mouse / trackball). Default 0 = pointer hidden (touch-only).
      - SHOW_MOUSE_CURSOR=${SHOW_MOUSE_CURSOR:-0}
      - MOCK_BACKEND=${MOCK_BACKEND:-0}
      - AUDIO_INPUT_DEVICE_INDEX=${AUDIO_INPUT_DEVICE_INDEX:-}
      - AUDIO_INPUT_DEVICE_NAME=${AUDIO_INPUT_DEVICE_NAME:-}
      # Match physical panel (e.g. ultrawide 3520x1080). Kivy reads these before Window is created.
      # Defaults are 1024×600 — without overrides, home-screen scaling stays at the small baseline.
      - DISPLAY_WIDTH=${DISPLAY_WIDTH:-1024}
      - DISPLAY_HEIGHT=${DISPLAY_HEIGHT:-600}
      # Set to 1 to run xrandr inside the container and override DISPLAY_* (needs x11-xserver-utils).
      - MEETINGBOX_SYNC_DISPLAY_FROM_XRANDR=${MEETINGBOX_SYNC_DISPLAY_FROM_XRANDR:-0}
      # Host reboot/poweroff from UI container (see .env.example — nsenter or mounted helper scripts)
      - MEETINGBOX_LOCAL_REBOOT_CMD=${MEETINGBOX_LOCAL_REBOOT_CMD:-}
      - MEETINGBOX_LOCAL_POWEROFF_CMD=${MEETINGBOX_LOCAL_POWEROFF_CMD:-}
      - MEETINGBOX_LOCAL_REBOOT_HELPER=${MEETINGBOX_LOCAL_REBOOT_HELPER:-}
      - MEETINGBOX_LOCAL_POWEROFF_HELPER=${MEETINGBOX_LOCAL_POWEROFF_HELPER:-}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 cookie: boot script sets MEETINGBOX_X11_COOKIE (not in .env) so it wins over XAUTHORITY_HOST.
      - ${MEETINGBOX_X11_COOKIE:-${XAUTHORITY_HOST:-${HOME}/.Xauthority}}:/home/uiuser/.Xauthority:ro
      - ./data/config:/data/config
      # Host reboot/poweroff from Settings (nsenter PID 1 — needs cap_add below).
      - ./scripts/meetingbox-host-reboot:/usr/local/bin/meetingbox-host-reboot:ro
      - ./scripts/meetingbox-host-poweroff:/usr/local/bin/meetingbox-host-poweroff:ro
      # nmcli in the container talks to the host NetworkManager (WiFi from Home / Settings).
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd
    # Host group names (Docker resolves GIDs on this machine). Omit ``render`` here because
    # some minimal images have no ``render`` group — Docker then fails to start the container.
    # If EGL logs show renderD128 permission denied, add the group on the host and use
    # docker-compose.override.yml (see .env.example) to append ``render``.
    group_add:
      - video
      - audio
      - input
    # nsenter into host PID 1 for Settings → Restart/Power off. cap_add alone is NOT enough:
    # Docker returns "reassociate to namespaces failed: Operation not permitted" without this.
    privileged: true
    # Default Docker seccomp can block setns() in edge cases; host reboot helpers need nsenter.
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    networks:
      - appliance-net

volumes:
  appliance-redis-data:

networks:
  appliance-net:
    driver: bridge
