name: meetingbox_device_ui
description: MeetingBox device UI — Flutter Linux kiosk app (replaces Kivy UI incrementally).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.7
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: AstaSans
      fonts:
        - asset: assets/fonts/AstaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/AstaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/AstaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/AstaSans-Bold.ttf
          weight: 700
  assets:
    - assets/welcome/
    - assets/home/
    - assets/home/figma/
    - assets/recording/
    - assets/recording/figma/
    - assets/recording/figma/ellipses/
    - assets/processing/
    - assets/processing/figma/
    - assets/summary/
    - assets/summary/figma/
    - assets/brief/
    - assets/brief/figma/
    - assets/calendar/
    - assets/calendar/figma/
    - assets/idle/
